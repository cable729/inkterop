name: docs

# One Pages deployment: the marketing site (website/) at the root and the
# mkdocs documentation under /docs/.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "website/**"
      - "mkdocs.yml"
      - "core/src/**"
      - "core/pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv run --project core --group docs mkdocs build --strict --site-dir site-docs
      - name: Assemble site (landing at /, docs under /docs/)
        run: |
          mkdir -p site
          cp -R website/. site/
          mkdir -p site/docs
          cp -R site-docs/. site/docs/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
