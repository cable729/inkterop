<?xml version="1.0" encoding="UTF-8"?>
<!-- Hand-made generic-SVG reader fixture (CC0). Expected ink: 5 strokes. -->
<svg xmlns="http://www.w3.org/2000/svg" width="200pt" height="150pt" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="lg"><stop offset="0" stop-color="#fff"/></linearGradient>
    <clipPath id="cp"><rect x="0" y="0" width="10" height="10"/></clipPath>
  </defs>
  <style>.decoy { stroke: purple; }</style>
  <!-- 1: absolute M/L/H/V + relative l -->
  <path d="M 10 10 L 50 10 H 60 V 20 l 10 5" fill="none" stroke="#ff0000" stroke-width="2"/>
  <!-- 2: transformed relative path: local (5,5)->(15,5) => page (20,30)->(40,30) -->
  <g transform="translate(10,20) scale(2)">
    <path d="M 5 5 l 10 0" fill="none" stroke="black" stroke-width="1"/>
  </g>
  <!-- 3: cubic curve, style= attr wins over presentation attr -->
  <path d="M 60 100 C 60 80 100 80 100 100" fill="none" stroke="#123456"
        style="stroke: rgb(0,0,255); stroke-opacity: 0.5" stroke-width="3"/>
  <!-- 4: polyline, 3-digit hex -->
  <polyline points="120,10 130,20 140,10" fill="none" stroke="#0a0" stroke-width="1.5"/>
  <!-- 5: line -->
  <line x1="10" y1="140" x2="190" y2="140" stroke="black" stroke-width="1"/>
  <!-- fill-only shape without data-rmi: NOT ink, skipped -->
  <path d="M 0 0 L 10 0 L 10 10 Z" fill="#00ff00"/>
  <!-- arc command: unsupported, whole path skipped with a warning -->
  <path d="M 150 100 A 10 10 0 0 1 170 100" fill="none" stroke="black"/>
</svg>
