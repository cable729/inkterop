<?xml version="1.0" encoding="UTF-8"?>
<!-- Hand-made Stylus Labs Write-FLAVORED fixture (CC0): schema authored by
     us from the styluslabs/templates README structure; NOT a Write export.
     2 pages, 3 pen strokes total; rulelines must be skipped as content. -->
<svg id="write-document" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<rect id="write-doc-background" width="100%" height="100%" fill="#808080"/>
<svg class="write-page" x="10" y="10" width="768px" height="1050px">
  <g class="write-content write-v3" width="768" height="1050" xruling="0" yruling="40" marginLeft="100" papercolor="#FFFFFF" rulecolor="#7F0000FF">
    <g class="ruleline write-std-ruling write-scale-down" fill="none" stroke="#0000FF" stroke-opacity="0.498" stroke-width="1" shape-rendering="crispEdges" vector-effect="non-scaling-stroke">
      <rect class="pagerect" fill="#FFFFFF" stroke="none" x="0" y="0" width="768" height="1050"/>
      <path d="M0 40 l768 0"/>
      <path d="M0 80 l768 0"/>
      <path d="M0 120 l768 0"/>
    </g>
    <path class="write-stroke-pen" __comx="110" __comy="90" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M100 100 l10 -20 10 20"/>
    <a xlink:href="https://example.com/" target="_top">
      <path class="write-stroke-pen" fill="none" stroke="#AA0000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M150 100 l0 -30"/>
    </a>
  </g>
</svg>
<svg class="write-page" x="10" y="1070" width="768px" height="1050px">
  <g class="write-content write-v3" width="768" height="1050" xruling="35" yruling="35" marginLeft="0" papercolor="#FFFFFF" rulecolor="#FF000000">
    <g class="ruleline">
      <rect class="pagerect" fill="#FFFFFF" stroke="none" x="0" y="0" width="768" height="1050"/>
    </g>
    <polyline class="write-stroke-highlight" fill="none" stroke="#FFFF00" stroke-width="12" points="50,50 60,60 70,50"/>
  </g>
</svg>
</svg>
